<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Inventory Management System - Part 1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Inventory Management System</h1>

        <div class="form-section">
            <h3>Add New Item</h3>
            <input type="number" id="itemID" placeholder="Item ID">
            <input type="text" id="itemName" placeholder="Item Name">
            <input type="text" id="category" placeholder="Category">
            <input type="number" id="quantity" placeholder="Quantity">
            <input type="number" step="0.01" id="price" placeholder="Price">
            <input type="text" id="supplierName" placeholder="Supplier Name (Optional)">
            <label><input type="checkbox" id="isPopular"> Mark as Popular</label>
            <button onclick="addNewItem()">Add Item</button>
        </div>

        <div class="search-section">
            <input type="text" id="searchInput" placeholder="Search by name">
            <button onclick="searchItem()">Search</button>
            <button onclick="showAllItems()">Show All Items</button>
        </div>

        <div id="output" class="output"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
